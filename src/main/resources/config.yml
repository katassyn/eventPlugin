      spacing: 100
      max_instances: 4

    # Black Realm schematic
    # Shared spawn area with White Realm: -5747,-52,-448 x -6593,27,-1377
    black_realm:
      file_name: new_moon_black_realm
      size:
        x: 221
        y: 44
        z: 148
      spawn_area:
        min_x: -6593
        min_y: -52
        min_z: -1377
        max_x: -5747
        max_z: -448
        world: world
      spacing: 100
      max_instances: 4

    # Scan blocks for White Realm (uses CALCITE for mob spawns)
    white_realm_scan_blocks:
      player_spawn: GOLD_BLOCK
      mini_boss: OBSIDIAN
      final_boss: DIAMOND_BLOCK # Lord Silvanus spawn location
      mob_spawn: CALCITE # White realm uses CALCITE
      cauldron: CAULDRON # Fairy Wood damage buff block
      lord_respawn_1: END_PORTAL_FRAME # 100 Fairy Wood
      lord_respawn_2: END_PORTAL_FRAME # 200 Fairy Wood
      lord_respawn_3: END_PORTAL_FRAME # 300 Fairy Wood

    # Scan blocks for Black Realm (uses COARSE_DIRT for mob spawns)
    black_realm_scan_blocks:
      player_spawn: GOLD_BLOCK
      mini_boss: OBSIDIAN
      final_boss: DIAMOND_BLOCK # Lord Malachai spawn location
      mob_spawn: COARSE_DIRT # Black realm uses COARSE_DIRT
      cauldron: CAULDRON # Fairy Wood damage buff block
      lord_respawn_1: END_PORTAL_FRAME # 100 Fairy Wood
      lord_respawn_2: END_PORTAL_FRAME # 200 Fairy Wood
      lord_respawn_3: END_PORTAL_FRAME # 300 Fairy Wood

  # Warp names from Essentials for Map 1 (Black Bog)
  warps:
    normal: blackbog_normal
    hard: blackbog_hard

  # Level and currency requirements
  requirements:
    normal:
      level: 50
    hard:
      level: 75
      ips: 15 # Entry cost for Map 1 hard mode

  # Map 2 entry costs (per portal)
  map2_entry_cost:
    normal:
      new_moon_parchment: 1 # From IngredientPouchPlugin
    hard:
      new_moon_parchment: 1 # From IngredientPouchPlugin
      ips: 30

  # Fairy Wood costs
  cauldron_buff_cost: 50 # 50 Fairy Wood for 1 minute damage buff
  lord_respawn_costs:
    first: 100 # First respawn
    second: 200 # Second respawn
    third: 300 # Third respawn

  # New Moon Quests Configuration
  # Quests unlock sequentially within each chain
  # Two chains: White (1-5) and Black (6-10)
  # Quest 3 unlocks White Realm portal
  # Quest 8 unlocks Black Realm portal
  quests:
    # WHITE LORD CHAIN
    '1':
      chain_type: white
      description: Kill 100 Lunatic Goblins
      target_mob: lunatic_goblin
      required_kills: 100
      order_index: 0
      hard_mode: false

    '2':
      chain_type: white
      description: Collect 30 White Essence from Walking Wood
      target_mob: walking_wood
      required_kills: 30
      order_index: 1
      hard_mode: false

    '3':
      chain_type: white
      description: Defeat Patriarch of the Lords
      target_mob: patriarch_of_the_lords
      required_kills: 1
      order_index: 2
      hard_mode: false

    '4':
      chain_type: white
      description: Defeat Lord Silvanus, White King 3 times
      target_mob: lord_silvanus
      required_kills: 3
      order_index: 3
      hard_mode: false

    '5':
      chain_type: white
      description: Defeat Lord Silvanus 5 times (Hard)
      target_mob: lord_silvanus
      required_kills: 5
      order_index: 4
      hard_mode: true

    # BLACK LORD CHAIN
    '6':
      chain_type: black
      description: Kill 100 Nighty Witches
      target_mob: nighty_witch
      required_kills: 100
      order_index: 0
      hard_mode: false

    '7':
      chain_type: black
      description: Collect 50 Dark Essence from Nighty Witches
      target_mob: nighty_witch
      required_kills: 50
      order_index: 1
      hard_mode: false

    '8':
      chain_type: black
      description: Defeat Patriarch of the Lords
      target_mob: patriarch_of_the_lords
      required_kills: 1
      order_index: 2
      hard_mode: false

    '9':
      chain_type: black
      description: Defeat Lord Malachai, Black King 3 times
      target_mob: lord_malachai
      required_kills: 3
      order_index: 3
      hard_mode: false

    '10':
      chain_type: black
      description: Defeat Lord Malachai 5 times (Hard)
      target_mob: lord_malachai
      required_kills: 5
      order_index: 4
      hard_mode: true

